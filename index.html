<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Учета Целей</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.10.0/proj4.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8f9fa; }
        .header { background: linear-gradient(135deg, #6B1E2A, #4A141E); }
        .nav-tab { transition: all 0.3s; }
        .nav-tab.active { color: white; font-weight: 600; position: relative; }
        .nav-tab.active:after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 4px; background: white; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .form-input { border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px 16px; width: 100%; }
        .form-input:focus { border-color: #6B1E2A; box-shadow: 0 0 0 4px rgba(107,30,42,0.15); outline: none; }
        .map-container { height: 650px; border-radius: 16px; overflow: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <header class="header text-white py-6">
            <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <i class="fa fa-crosshairs text-3xl"></i>
                    <h1 class="text-3xl font-semibold">Система Учета Целей</h1>
                </div>
                <div class="flex gap-2 bg-white/10 rounded-3xl p-1">
                    <div onclick="switchTab(0)" class="nav-tab active cursor-pointer px-6 py-3 rounded-3xl" id="tab0">📝 Ввод</div>
                    <div onclick="switchTab(1)" class="nav-tab cursor-pointer px-6 py-3 rounded-3xl" id="tab1">📊 Аналитика</div>
                    <div onclick="switchTab(2)" class="nav-tab cursor-pointer px-6 py-3 rounded-3xl" id="tab2">🗺 Карта</div>
                    <div onclick="switchTab(3)" class="nav-tab cursor-pointer px-6 py-3 rounded-3xl" id="tab3">📋 Список</div>
                </div>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-6 py-10">
            <div id="content0" class="tab-content active">
                <div class="card p-10 max-w-2xl mx-auto">
                    <h2 class="text-3xl font-semibold text-center mb-8">Добавить новую цель</h2>
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div><label class="block text-sm mb-1">Дата</label><input type="date" id="date" class="form-input"></div>
                            <div><label class="block text-sm mb-1">Время</label><input type="time" id="time" class="form-input"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div><label class="block text-sm mb-1">X (СК-42)</label><input type="text" id="coordX" class="form-input font-mono" placeholder="5301923"></div>
                            <div><label class="block text-sm mb-1">Y (СК-42)</label><input type="text" id="coordY" class="form-input font-mono" placeholder="6662759"></div>
                        </div>
                        <div><label class="block text-sm mb-1">Частота</label><input type="text" id="frequency" class="form-input" placeholder="145.2 МГц"></div>
                        <div><label class="block text-sm mb-1">Тип цели</label><input type="text" id="targetType" class="form-input" placeholder="РЛС, Артиллерия..."></div>
                        <div><label class="block text-sm mb-1">Примечание</label><textarea id="note" rows="3" class="form-input"></textarea></div>
                        
                        <button onclick="addTarget()" class="w-full bg-[#6B1E2A] hover:bg-[#4A141E] text-white py-5 rounded-2xl text-lg font-semibold">
                            Добавить запись
                        </button>
                    </div>
                </div>
            </div>

            <div id="content1" class="tab-content">Аналитика</div>
            <div id="content2" class="tab-content"><div class="card p-4"><div id="map" class="map-container"></div></div></div>
            <div id="content3" class="tab-content"><div class="card" id="targetList"></div></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://neb6khhpx5aylyezl6u1oa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NEb6KHHpx5aYLyEZl6U1OA_y68ZalLF';
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let map, allTargets = [];

        proj4.defs("SK42", "+proj=tmerc +lat_0=0 +lon_0=39 +k=1 +x_0=500000 +y_0=0 +ellps=krass +towgs84=23.57,-140.95,-79.8,-0,-0.35,-0.79,-0.25 +units=m +no_defs");

        async function init() {
            const now = new Date();
            document.getElementById('date').value = now.toISOString().split('T')[0];
            document.getElementById('time').value = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

            initMap();
            await loadTargets();
            switchTab(0);
        }

        function initMap() {
            map = L.map('map').setView([47.85, 35.15], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        async function loadTargets() {
            const { data } = await supabase.from('targets').select('*').order('created_at', { ascending: false });
            allTargets = data || [];
            renderList();
        }

        async function addTarget() {
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const x = parseFloat(document.getElementById('coordX').value);
            const y = parseFloat(document.getElementById('coordY').value);
            const frequency = document.getElementById('frequency').value.trim();
            const type = document.getElementById('targetType').value.trim() || 'Другое';
            const note = document.getElementById('note').value.trim();

            if (!x || !y) return alert('Введите X и Y!');

            let lat = null, lng = null;
            try {
                const wgs = proj4("SK42", "WGS84", [x, y]);
                lng = wgs[0]; lat = wgs[1];
            } catch(e) {}

            const { error } = await supabase.from('targets').insert([{ date, time, x, y, frequency, type, note, lat, lng }]);
            if (error) alert('Ошибка: ' + error.message);
            else {
                alert('✅ Добавлено!');
                loadTargets();
                document.getElementById('coordX').value = '';
                document.getElementById('coordY').value = '';
                document.getElementById('frequency').value = '';
                document.getElementById('targetType').value = '';
                document.getElementById('note').value = '';
            }
        }

        function renderList() {
            const container = document.getElementById('targetList');
            let html = `<div class="p-4 font-medium">Всего: ${allTargets.length}</div>`;
            allTargets.forEach(t => {
                html += `<div class="p-5 border-b hover:bg-gray-50">${t.type} — ${t.date} ${t.time}</div>`;
            });
            container.innerHTML = html;
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('content' + n).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach((el, i) => el.classList.toggle('active', i === n));
            if (n === 2 && map) setTimeout(() => map.invalidateSize(), 200);
        }

        window.onload = init;
    </script>
</body>
</html>
