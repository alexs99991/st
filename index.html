<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система фиксации целей</title>

    <link rel="icon" href="data:,">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.12.0/proj4.js"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
        }

        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow:
                0 20px 25px -5px rgb(0 0 0 / 0.25),
                0 8px 10px -6px rgb(0 0 0 / 0.25);
        }

        .input-focus:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow:
                0 0 0 4px rgba(59,130,246,.25);
        }

        table {
            border-collapse: collapse;
        }

        td,
        th {
            vertical-align: top;
        }

    </style>

</head>

<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950 text-slate-100 min-h-screen">

<div class="max-w-7xl mx-auto p-8">

    <!-- HEADER -->

    <div class="flex justify-between items-center mb-10">

        <div class="flex items-center gap-4">

            <div class="w-14 h-14 bg-blue-600 rounded-3xl flex items-center justify-center text-3xl shadow-lg shadow-blue-500/50">
                🎯
            </div>

            <div>

                <h1 class="text-5xl font-bold tracking-tight text-white">
                    Фиксация целей
                </h1>

                <p class="text-slate-300 text-lg mt-1">
                </p>

            </div>

        </div>

        <button
                onclick="exportToExcel()"
                class="flex items-center gap-3 bg-emerald-600 hover:bg-emerald-700 px-6 py-4 rounded-3xl font-semibold transition-all active:scale-95 text-lg"
        >

            <i class="fa-solid fa-file-excel"></i>

            <span>
                Сохранить Excel
            </span>

        </button>

    </div>

    <!-- CONTENT -->

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

        <!-- FORM -->

        <div class="lg:col-span-5">

            <div class="glass rounded-3xl p-8 border border-white/10 shadow-2xl card-hover">

                <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3 text-white">

                    <i class="fa-solid fa-plus-circle text-blue-400"></i>

                    Новая запись

                </h2>

                <form id="dataForm" class="space-y-6">

                    <div class="grid grid-cols-2 gap-4">

                        <div>

                            <label class="block text-sm font-medium text-slate-300 mb-2">
                                Дата
                            </label>

                            <input
                                    type="date"
                                    id="date"
                                    class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg text-white"
                            >

                        </div>

                        <div>

                            <label class="block text-sm font-medium text-slate-300 mb-2">
                                Время
                            </label>

                            <input
                                    type="time"
                                    id="time"
                                    class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg text-white"
                            >

                        </div>

                    </div>

                    <div class="grid grid-cols-2 gap-4">

                        <div>

                            <label class="block text-sm font-medium text-slate-300 mb-2">
                                X (СК-42)
                            </label>

                            <input
                                    type="number"
                                    step="0.01"
                                    id="x"
                                    placeholder="5301923"
                                    class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg text-white"
                            >

                        </div>

                        <div>

                            <label class="block text-sm font-medium text-slate-300 mb-2">
                                Y (СК-42)
                            </label>

                            <input
                                    type="number"
                                    step="0.01"
                                    id="y"
                                    placeholder="6662759"
                                    class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg text-white"
                            >

                        </div>

                    </div>

                    <div>

                        <label class="block text-sm font-medium text-slate-300 mb-2">
                            Тип цели
                        </label>

                        <input
                                type="text"
                                id="targetType"
                                placeholder="Введите тип цели"
                                class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg text-white"
                        >

                    </div>

                    <div class="grid grid-cols-2 gap-4">

                        <div>

                            <label class="block text-sm font-medium text-slate-300 mb-2">
                                Обнаружил
                            </label>

                            <input
                                    type="text"
                                    id="detectedBy"
                                    placeholder="Иванов А."
                                    class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg text-white"
                            >

                        </div>

                        <div>

                            <label class="block text-sm font-medium text-slate-300 mb-2">
                                Частота (МГц)
                            </label>

                            <input
                                    type="number"
                                    step="0.1"
                                    id="frequency"
                                    placeholder="148.5"
                                    class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg text-white"
                            >

                        </div>

                    </div>

                    <div>

                        <label class="block text-sm font-medium text-slate-300 mb-2">
                            Примечание
                        </label>

                        <textarea
                                id="note"
                                rows="4"
                                placeholder="Дополнительная информация..."
                                class="input-focus w-full bg-slate-900 border border-slate-700 rounded-3xl px-5 py-4 text-lg text-white resize-none leading-relaxed"
                        ></textarea>

                    </div>

                    <button
                            type="button"
                            onclick="saveRecord()"
                            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 py-5 rounded-3xl font-semibold text-xl flex items-center justify-center gap-3"
                    >

                        <i class="fa-solid fa-floppy-disk"></i>

                        Сохранить запись

                    </button>

                </form>

            </div>

        </div>

        <!-- TABLE -->

        <div class="lg:col-span-7">

            <div class="glass rounded-3xl overflow-hidden border border-white/10 shadow-2xl h-full flex flex-col">

                <div class="px-8 py-6 border-b border-white/10 flex justify-between bg-slate-900/50">

                    <h2 class="text-3xl font-semibold flex items-center gap-3 text-white">

                        <i class="fa-solid fa-list"></i>

                        Журнал наблюдений

                    </h2>

                    <button
                            onclick="loadRecords()"
                            class="flex items-center gap-2 text-slate-300 hover:text-white text-lg"
                    >

                        <i class="fa-solid fa-arrows-rotate"></i>

                        Обновить

                    </button>

                </div>

                <div class="flex-1 overflow-auto"
                     style="max-height: calc(100vh - 280px)">

                    <table id="recordsTable"
                           class="w-full text-base">

                        <thead class="sticky top-0 bg-slate-900/95 backdrop-blur-md">

                        <tr class="border-b border-white/10">

                            <th class="px-6 py-5 text-left text-slate-200">
                                Дата
                            </th>

                            <th class="px-6 py-5 text-left text-slate-200">
                                Время
                            </th>

                            <th class="px-6 py-5 text-left text-slate-200">
                                Координаты
                            </th>

                            <th class="px-6 py-5 text-left text-slate-200">
                                Тип цели
                            </th>

                            <th class="px-6 py-5 text-left text-slate-200">
                                Обнаружил
                            </th>

                            <th class="px-6 py-5 text-left text-slate-200">
                                Частота
                            </th>

                            <th class="px-6 py-5 text-left text-slate-200">
                                Примечание
                            </th>

                        </tr>

                        </thead>

                        <tbody id="tableBody"
                               class="divide-y divide-white/10">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- TOAST -->

<div
        id="toast"
        class="hidden fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 text-white text-lg z-50"
></div>

<script>

    // =====================================================
    // SUPABASE
    // =====================================================

    const { createClient } = supabase;

    const supabaseUrl =
        'https://znislbxlwnwdbgumtlwo.supabase.co';

    const supabaseKey =
        'sb_publishable_NEb6KHHpx5aYLyEZl6U1OA_y68ZalLF';

    const db = createClient(
        supabaseUrl,
        supabaseKey
    );

    // =====================================================
    // СК-42 УКРАИНА
    // =====================================================

    function getSK42Zone(y) {

        return Math.floor(y / 1000000);

    }

    function getProj4Def(zone) {

        const lon0 = zone * 6 - 3;

        const falseEasting =
            zone * 1000000 + 500000;

        return "+proj=tmerc " +
            "+lat_0=0 " +
            "+lon_0=" + lon0 + " " +
            "+k=1 " +
            "+x_0=" + falseEasting + " " +
            "+y_0=0 " +
            "+ellps=krass " +
            "+towgs84=23.92,-141.27,-80.9,0,0.35,0.82,-0.12 " +
            "+units=m " +
            "+no_defs";

    }

    function convertSK42toWGS84(x, y) {

        try {

            const zone = getSK42Zone(y);

            const projName =
                "SK42_ZONE_" + zone;

            const projString =
                getProj4Def(zone);

            proj4.defs(
                projName,
                projString
            );

            const result = proj4(
                projName,
                "WGS84",
                [y, x]
            );

            return {

                lat: result[1],

                lon: result[0],

                zone: zone

            };

        } catch (e) {

            console.error(
                "Ошибка СК-42:",
                e
            );

            return null;

        }

    }

    // =====================================================
    // DATE/TIME
    // =====================================================

    function setCurrentDateTime() {

        const now = new Date();

        document.getElementById('date').value =
            now.toISOString().split('T')[0];

        document.getElementById('time').value =
            now.toTimeString().slice(0,5);

    }

    // =====================================================
    // SAVE RECORD
    // =====================================================

    async function saveRecord() {

        const x = parseFloat(
            document.getElementById('x').value
        );

        const y = parseFloat(
            document.getElementById('y').value
        );

        const converted =
            convertSK42toWGS84(x, y);

        const record = {

            date:
                document.getElementById('date').value,

            time:
                document.getElementById('time').value,

            x: x,

            y: y,

            lat:
                converted
                    ? converted.lat
                    : null,

            lon:
                converted
                    ? converted.lon
                    : null,

            target_type:
                document.getElementById('targetType').value,

            detected_by:
                document.getElementById('detectedBy').value,

            frequency:
                parseFloat(
                    document.getElementById('frequency').value
                ) || null,

            note:
                document.getElementById('note').value,

            created_at:
                new Date().toISOString()

        };

        if (
            !record.date ||
            !record.time ||
            isNaN(record.x) ||
            isNaN(record.y) ||
            !record.target_type
        ) {

            showToast(
                'Заполните обязательные поля!',
                true
            );

            return;

        }

        try {

            const { error } =
                await db
                    .from('observations')
                    .insert([record]);

            if (error) {
                throw error;
            }

            showToast(
                'Запись успешно сохранена!'
            );

            document
                .getElementById('dataForm')
                .reset();

            setCurrentDateTime();

            loadRecords();

        } catch (error) {

            console.error(error);

            showToast(
                'Ошибка: ' + error.message,
                true
            );

        }

    }

    // =====================================================
    // LOAD RECORDS
    // =====================================================

    async function loadRecords() {

        try {

            const { data, error } =
                await db
                    .from('observations')
                    .select('*')
                    .order(
                        'created_at',
                        {
                            ascending: false
                        }
                    );

            if (error) {
                throw error;
            }

            renderTable(data || []);

        } catch (error) {

            console.error(error);

            showToast(
                'Ошибка загрузки данных',
                true
            );

        }

    }

    // =====================================================
    // TABLE
    // =====================================================

    function renderTable(records) {

        const tbody =
            document.getElementById('tableBody');

        tbody.innerHTML =
            records.length === 0

            ? `
                <tr>

                    <td
                        colspan="7"
                        class="px-6 py-12 text-center text-slate-400 text-lg"
                    >
                        Пока нет записей
                    </td>

                </tr>
            `

            : records.map(r => `

                <tr class="hover:bg-white/5 transition-colors border-b border-white/5">

                    <td class="px-6 py-5 text-base font-medium text-white">
                        ${r.date}
                    </td>

                    <td class="px-6 py-5 text-base text-slate-300">
                        ${r.time}
                    </td>

                    <td class="px-6 py-5">

                        <div class="font-mono text-blue-300 text-sm">
                            X: ${r.x}
                        </div>

                        <div class="font-mono text-cyan-300 text-sm mt-1">
                            Y: ${r.y}
                        </div>

                        ${
                            r.lat && r.lon
                            ? `
                                <div class="text-emerald-300 text-xs mt-2">
                                    ${r.lat.toFixed(6)},
                                    ${r.lon.toFixed(6)}
                                </div>
                            `
                            : ''
                        }

                    </td>

                    <td class="px-6 py-5">

                        <span class="px-4 py-1.5 bg-blue-900/60 text-blue-200 rounded-full text-sm font-medium">

                            ${r.target_type}

                        </span>

                    </td>

                    <td class="px-6 py-5 text-slate-200 text-base">
                        ${r.detected_by || '—'}
                    </td>

                    <td class="px-6 py-5 text-slate-200 text-base">

                        ${
                            r.frequency
                            ? r.frequency + ' МГц'
                            : '—'
                        }

                    </td>

                    <td class="px-6 py-5 text-slate-300 text-sm leading-relaxed max-w-sm">

                        ${r.note || '—'}

                    </td>

                </tr>

            `).join('');

    }

    // =====================================================
    // EXPORT
    // =====================================================

    function exportToExcel() {

        const table =
            document.getElementById(
                'recordsTable'
            );

        if (!table) return;

        const link =
            document.createElement('a');

        link.href =
            'data:application/vnd.ms-excel;base64,' +
            window.btoa(
                unescape(
                    encodeURIComponent(
                        table.outerHTML
                    )
                )
            );

        link.download =
            `цели_${
                new Date()
                    .toISOString()
                    .slice(0,10)
            }.xls`;

        link.click();

        showToast(
            'Excel файл скачивается...'
        );

    }

    // =====================================================
    // TOAST
    // =====================================================

    function showToast(
        message,
        isError = false
    ) {

        const toast =
            document.getElementById('toast');

        toast.textContent = message;

        toast.className =
            `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 text-white text-lg ${
                isError
                ? 'bg-red-600'
                : 'bg-emerald-600'
            }`;

        toast.classList.remove('hidden');

        setTimeout(() => {

            toast.classList.add('hidden');

        }, 3000);

    }

    // =====================================================
    // START
    // =====================================================

    window.onload = () => {

        setCurrentDateTime();

        loadRecords();

    };

</script>

</body>
</html>
