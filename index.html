<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система фиксации целей</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
        }
        
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950 text-slate-200 min-h-screen">
    <div class="max-w-7xl mx-auto p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-blue-500/50">
                    🎯
                </div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">Фиксация целей</h1>
                    <p class="text-slate-400">Тактическая система наблюдения</p>
                </div>
            </div>
            
            <button onclick="exportToExcel()" 
                    class="flex items-center gap-3 bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-2xl font-semibold transition-all active:scale-95 shadow-lg">
                <i class="fa-solid fa-file-excel"></i>
                <span>Сохранить в Excel</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Форма -->
            <div class="lg:col-span-5">
                <div class="glass rounded-3xl p-8 border border-white/10 shadow-2xl card-hover">
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-plus-circle text-blue-400"></i>
                        Новая запись
                    </h2>
                    
                    <form id="dataForm" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Дата</label>
                                <input type="date" id="date" class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Время</label>
                                <input type="time" id="time" class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Координата X</label>
                                <input type="number" step="0.000001" id="x" placeholder="55.123456" 
                                       class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Координата Y</label>
                                <input type="number" step="0.000001" id="y" placeholder="37.567890" 
                                       class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1.5">Тип цели</label>
                            <select id="targetType" class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
                                <option value="">Выберите тип</option>
                                <option value="Пехота">Пехота</option>
                                <option value="Техника">Техника</option>
                                <option value="Артиллерия">Артиллерия</option>
                                <option value="БПЛА">БПЛА</option>
                                <option value="ПВО">ПВО</option>
                                <option value="РЭБ">РЭБ</option>
                                <option value="Другое">Другое</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Обнаружил</label>
                                <input type="text" id="detectedBy" placeholder="Иванов А." 
                                       class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Частота (МГц)</label>
                                <input type="number" step="0.1" id="frequency" placeholder="148.5" 
                                       class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1.5">Примечание</label>
                            <textarea id="note" rows="3" placeholder="Дополнительная информация..." 
                                      class="input-focus w-full bg-slate-900 border border-slate-700 rounded-3xl px-5 py-4 text-lg resize-none"></textarea>
                        </div>

                        <button type="button" onclick="saveRecord()" 
                                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 py-5 rounded-3xl font-semibold text-xl flex items-center justify-center gap-3 transition-all active:scale-95">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Сохранить запись
                        </button>
                    </form>
                </div>
            </div>

            <!-- Таблица -->
            <div class="lg:col-span-7">
                <div class="glass rounded-3xl overflow-hidden border border-white/10 shadow-2xl h-full flex flex-col">
                    <div class="px-8 py-6 border-b border-white/10 flex justify-between bg-slate-900/50">
                        <h2 class="text-2xl font-semibold flex items-center gap-3">
                            <i class="fa-solid fa-list"></i>
                            Журнал наблюдений
                        </h2>
                        <button onclick="loadRecords()" class="flex items-center gap-2 text-slate-400 hover:text-white">
                            <i class="fa-solid fa-arrows-rotate"></i>
                            Обновить
                        </button>
                    </div>
                    
                    <div class="flex-1 overflow-auto" style="max-height: calc(100vh - 280px)">
                        <table id="recordsTable" class="w-full text-sm">
                            <thead class="sticky top-0 bg-slate-900/95 backdrop-blur-md">
                                <tr class="border-b border-white/10">
                                    <th class="px-6 py-4 text-left">Дата</th>
                                    <th class="px-6 py-4 text-left">Время</th>
                                    <th class="px-6 py-4 text-left">Координаты</th>
                                    <th class="px-6 py-4 text-left">Тип цели</th>
                                    <th class="px-6 py-4 text-left">Обнаружил</th>
                                    <th class="px-6 py-4 text-left">Частота</th>
                                    <th class="px-6 py-4 text-left">Примечание</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-white/10"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 text-white">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toastText" class="font-medium"></span>
    </div>

    <script>
        const supabaseUrl = 'https://znislbxlwnwdbgumtlwo.supabase.co';
        const supabaseKey = 'sb_publishable_NEb6KHHpx5aYLyEZl6U1OA_y68ZalLF';
        const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

        function setCurrentDateTime() {
            const now = new Date();
            document.getElementById('date').value = now.toISOString().split('T')[0];
            document.getElementById('time').value = now.toTimeString().slice(0,5);
        }

        async function saveRecord() {
            const record = {
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                x: parseFloat(document.getElementById('x').value),
                y: parseFloat(document.getElementById('y').value),
                target_type: document.getElementById('targetType').value,
                detected_by: document.getElementById('detectedBy').value,
                frequency: parseFloat(document.getElementById('frequency').value) || null,
                note: document.getElementById('note').value,
                created_at: new Date().toISOString()
            };

            if (!record.date || !record.time || isNaN(record.x) || isNaN(record.y) || !record.target_type) {
                showToast('Заполните обязательные поля!', true);
                return;
            }

            try {
                const { error } = await supabase.from('observations').insert([record]);
                if (error) throw error;

                showToast('Запись успешно сохранена!');
                document.getElementById('dataForm').reset();
                setCurrentDateTime();
                loadRecords();
            } catch (error) {
                console.error(error);
                showToast('Ошибка: ' + error.message, true);
            }
        }

        async function loadRecords() {
            try {
                const { data, error } = await supabase
                    .from('observations')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                renderTable(data || []);
            } catch (error) {
                console.error(error);
                showToast('Ошибка загрузки', true);
            }
        }

        function renderTable(records) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-slate-400">Пока нет записей</td></tr>`;
                return;
            }

            records.forEach(r => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-white/5 transition-colors';
                row.innerHTML = `
                    <td class="px-6 py-4">${r.date}</td>
                    <td class="px-6 py-4">${r.time}</td>
                    <td class="px-6 py-4 font-mono text-blue-400">${r.x}, ${r.y}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-blue-900/60 text-blue-300 rounded-full text-xs">${r.target_type}</span>
                    </td>
                    <td class="px-6 py-4">${r.detected_by || '—'}</td>
                    <td class="px-6 py-4">${r.frequency ? r.frequency + ' МГц' : '—'}</td>
                    <td class="px-6 py-4 text-slate-400 max-w-xs truncate">${r.note || '—'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function exportToExcel() {
            const table = document.getElementById('recordsTable');
            if (!table) return;

            const html = table.outerHTML;
            const template = `<html><head><meta charset="UTF-8"></head><body>${html}</body></html>`;
            const link = document.createElement('a');
            link.href = 'data:application/vnd.ms-excel;base64,' + window.btoa(unescape(encodeURIComponent(template)));
            link.download = `цели_${new Date().toISOString().slice(0,10)}.xls`;
            link.click();
            showToast('Файл Excel скачивается...');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toastText');
            text.textContent = message;
            toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 text-white ${isError ? 'bg-red-600' : 'bg-emerald-600'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        window.onload = () => {
            setCurrentDateTime();
            loadRecords();
        };
    </script>
</body>
</html>
