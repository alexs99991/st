<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Учета Целей</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.10.0/proj4.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8f9fa; }
        .header { background: linear-gradient(135deg, #6B1E2A, #4A141E); }
        .nav-tab { transition: all 0.2s; }
        .nav-tab.active { border-bottom: 4px solid #fff; color: white; font-weight: 600; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-input { border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 14px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .map-container { height: 650px; border-radius: 12px; overflow: hidden; }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <header class="header text-white py-5 shadow-lg">
            <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa fa-crosshairs text-3xl"></i>
                    <h1 class="text-2xl font-semibold">Система Учета Целей</h1>
                </div>
                <div class="flex gap-8 text-base">
                    <div onclick="switchTab(0)" class="nav-tab active cursor-pointer px-4 py-2" id="tab0">📝 Ввод</div>
                    <div onclick="switchTab(1)" class="nav-tab cursor-pointer px-4 py-2" id="tab1">📊 Аналитика</div>
                    <div onclick="switchTab(2)" class="nav-tab cursor-pointer px-4 py-2" id="tab2">🗺 Карта</div>
                    <div onclick="switchTab(3)" class="nav-tab cursor-pointer px-4 py-2" id="tab3">📋 Список</div>
                </div>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-6 py-8">

            <!-- TAB 1: ВВОД -->
            <div id="content0" class="tab-content active">
                <div class="card p-8 max-w-lg mx-auto">
                    <h2 class="text-2xl font-semibold mb-6 text-center">Добавить цель</h2>
                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium mb-1">Дата</label><input type="date" id="date" class="form-input"></div>
                            <div><label class="block text-sm font-medium mb-1">Время</label><input type="time" id="time" class="form-input"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium mb-1">X (СК-42)</label><input type="text" id="coordX" class="form-input font-mono" placeholder="5301923"></div>
                            <div><label class="block text-sm font-medium mb-1">Y (СК-42)</label><input type="text" id="coordY" class="form-input font-mono" placeholder="6662759"></div>
                        </div>
                        <div><label class="block text-sm font-medium mb-1">Частота</label><input type="text" id="frequency" class="form-input" placeholder="145.2 МГц"></div>
                        <div><label class="block text-sm font-medium mb-1">Тип цели</label><input type="text" id="targetType" class="form-input" placeholder="РЛС, Артиллерия, Склад..."></div>
                        <div><label class="block text-sm font-medium mb-1">Примечание</label><textarea id="note" rows="3" class="form-input"></textarea></div>
                        
                        <button onclick="addTarget()" class="w-full bg-[#6B1E2A] hover:bg-[#4A141E] text-white py-4 rounded-xl text-lg font-semibold">
                            <i class="fa fa-save"></i> Добавить запись
                        </button>
                    </div>
                </div>
            </div>

            <!-- TAB 2: АНАЛИТИКА -->
            <div id="content1" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="card p-6"><div class="text-gray-500">Сегодня</div><div id="todayCount" class="text-5xl font-bold text-[#6B1E2A]">0</div></div>
                    <div class="card p-6"><div class="text-gray-500">За неделю</div><div id="weekCount" class="text-5xl font-bold text-[#6B1E2A]">0</div></div>
                    <div class="card p-6"><div class="text-gray-500">Всего целей</div><div id="totalCount" class="text-5xl font-bold text-[#6B1E2A]">0</div></div>
                    <div class="card p-6"><div class="text-gray-500">Типов</div><div id="typesCount" class="text-5xl font-bold text-[#6B1E2A]">0</div></div>
                </div>
                <div class="card p-6 mt-6">
                    <h3 class="font-semibold mb-4">Распределение по типам</h3>
                    <div id="typeChart" class="space-y-4"></div>
                </div>
            </div>

            <!-- TAB 3: КАРТА -->
            <div id="content2" class="tab-content">
                <div class="card p-4">
                    <div id="map" class="map-container"></div>
                </div>
                <div class="flex gap-6 mt-4 text-sm flex-wrap">
                    <div class="flex items-center gap-2"><span class="dot bg-red-500"></span> Артиллерия</div>
                    <div class="flex items-center gap-2"><span class="dot bg-blue-500"></span> РЛС</div>
                    <div class="flex items-center gap-2"><span class="dot bg-green-500"></span> Склад</div>
                    <div class="flex items-center gap-2"><span class="dot bg-purple-500"></span> Другое</div>
                </div>
            </div>

            <!-- TAB 4: СПИСОК -->
            <div id="content3" class="tab-content">
                <div class="card">
                    <div class="p-4 border-b flex justify-between items-center">
                        <h2 class="font-semibold">Все цели</h2>
                        <input type="text" id="search" placeholder="Поиск..." onkeyup="filterList()" class="form-input w-72">
                    </div>
                    <div id="targetList" class="max-h-[65vh] overflow-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="card max-w-lg w-full mx-4 p-8">
            <div class="flex justify-between items-start">
                <h3 id="modalTitle" class="text-xl font-semibold"></h3>
                <button onclick="closeModal()" class="text-3xl leading-none">×</button>
            </div>
            <div id="modalContent" class="mt-6 space-y-4"></div>
            <div class="mt-8 flex gap-3">
                <button onclick="deleteCurrent()" class="flex-1 py-3 border border-red-500 text-red-600 rounded-xl">Удалить</button>
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-800 text-white rounded-xl">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://neb6khhpx5aylyezl6u1oa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NEb6KHHpx5aYLyEZl6U1OA_y68ZalLF';
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let map, allTargets = [], markers = [], currentId = null;

        proj4.defs("SK42", "+proj=tmerc +lat_0=0 +lon_0=39 +k=1 +x_0=500000 +y_0=0 +ellps=krass +towgs84=23.57,-140.95,-79.8,-0,-0.35,-0.79,-0.25 +units=m +no_defs");

        async function init() {
            const now = new Date();
            document.getElementById('date').value = now.toISOString().split('T')[0];
            document.getElementById('time').value = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

            initMap();
            await loadTargets();
            switchTab(0);
        }

        function initMap() {
            map = L.map('map').setView([47.85, 35.15], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            map.on('click', function(e) {
                if (confirm('Добавить цель в этой точке?')) {
                    addFromMap(e.latlng.lat, e.latlng.lng);
                }
            });
        }

        async function loadTargets() {
            const { data } = await supabase.from('targets').select('*').order('created_at', { ascending: false });
            allTargets = data || [];
            renderList();
            plotMarkers();
            updateDashboard();
        }

        function getColor(type) {
            const t = (type || '').toLowerCase();
            if (t.includes('арт')) return '#ef4444';
            if (t.includes('рлс')) return '#3b82f6';
            if (t.includes('склад')) return '#22c55e';
            return '#8b5cf6';
        }

        function plotMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            allTargets.forEach(t => {
                if (!t.lat || !t.lng) return;
                const marker = L.circleMarker([t.lat, t.lng], {
                    radius: 9, fillColor: getColor(t.type), color: '#fff', weight: 3, fillOpacity: 0.9
                }).addTo(map);
                marker.bindPopup(`<b>${t.type}</b><br>${t.date} ${t.time}`);
                marker.on('click', () => showDetail(t));
                markers.push(marker);
            });
        }

        async function addTarget() {
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const x = parseFloat(document.getElementById('coordX').value);
            const y = parseFloat(document.getElementById('coordY').value);
            const frequency = document.getElementById('frequency').value.trim();
            const type = document.getElementById('targetType').value.trim() || 'Другое';
            const note = document.getElementById('note').value.trim();

            if (!x || !y) return alert('Введите X и Y');

            let lat = null, lng = null;
            try {
                const wgs = proj4("SK42", "WGS84", [x, y]);
                lng = wgs[0]; lat = wgs[1];
            } catch(e) {}

            const { error } = await supabase.from('targets').insert([{ date, time, x, y, frequency, type, note, lat, lng }]);
            if (error) alert('Ошибка: ' + error.message);
            else {
                alert('✅ Цель добавлена!');
                loadTargets();
                document.getElementById('coordX').value = '';
                document.getElementById('coordY').value = '';
                document.getElementById('frequency').value = '';
                document.getElementById('targetType').value = '';
                document.getElementById('note').value = '';
            }
        }

        async function addFromMap(lat, lng) {
            const type = prompt('Тип цели:', 'Другое') || 'Другое';
            const freq = prompt('Частота:', '');
            const note = prompt('Примечание:', 'Добавлено с карты');

            const { error } = await supabase.from('targets').insert([{
                date: new Date().toISOString().split('T')[0],
                time: new Date().toTimeString().slice(0,5),
                frequency: freq, type, note, lat, lng
            }]);
            if (!error) loadTargets();
        }

        function renderList(filtered = null) {
            const data = filtered || allTargets;
            const container = document.getElementById('targetList');
            let html = `<div class="p-4 bg-gray-50 font-medium">Всего целей: ${data.length}</div>`;
            data.forEach(t => {
                html += `
                <div onclick="showDetailById('${t.id}')" class="p-5 border-b hover:bg-zinc-50 cursor-pointer flex justify-between">
                    <div>
                        <div class="font-semibold">${t.type}</div>
                        <div class="text-sm">${t.date} ${t.time}</div>
                        <div class="text-xs">X:${t.x||'-'} Y:${t.y||'-'} ${t.frequency ? '| '+t.frequency : ''}</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation(); deleteTarget('${t.id}')" class="text-red-600 text-2xl">🗑</button>
                </div>`;
            });
            container.innerHTML = html || '<p class="p-10 text-center text-gray-400">Пока нет целей</p>';
        }

        function filterList() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allTargets.filter(t => 
                (t.type||'').toLowerCase().includes(term) || 
                (t.note||'').toLowerCase().includes(term) ||
                (t.frequency||'').toLowerCase().includes(term)
            );
            renderList(filtered);
        }

        function showDetail(t) {
            currentId = t.id;
            document.getElementById('modalTitle').textContent = t.type;
            document.getElementById('modalContent').innerHTML = `
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <div><b>Дата:</b> ${t.date}</div><div><b>Время:</b> ${t.time}</div>
                    <div><b>X:</b> ${t.x||'-'}</div><div><b>Y:</b> ${t.y||'-'}</div>
                    ${t.frequency ? `<div><b>Частота:</b> ${t.frequency}</div>` : ''}
                </div>
                <div class="mt-4"><b>Примечание:</b><br><div class="bg-zinc-50 p-3 rounded-lg">${t.note || '—'}</div></div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function showDetailById(id) {
            const target = allTargets.find(t => t.id === id);
            if (target) showDetail(target);
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

        async function deleteTarget(id) {
            if (confirm('Удалить цель?')) {
                await supabase.from('targets').delete().eq('id', id);
                loadTargets();
                closeModal();
            }
        }

        function deleteCurrent() { if (currentId) deleteTarget(currentId); }

        function updateDashboard() {
            const total = allTargets.length;
            document.getElementById('totalCount').textContent = total;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('todayCount').textContent = allTargets.filter(t => t.date === today).length;

            const types = {};
            allTargets.forEach(t => types[t.type] = (types[t.type]||0)+1);
            document.getElementById('typesCount').textContent = Object.keys(types).length;

            let chart = '';
            Object.keys(types).forEach(key => {
                const c = types[key];
                chart += `<div class="flex justify-between mb-1"><span>${key}</span><span class="font-medium">${c}</span></div>
                          <div class="h-2 bg-gray-200 rounded mb-4"><div class="h-2 bg-[#6B1E2A] rounded" style="width:${Math.round(c/total*100)}%"></div></div>`;
            });
            document.getElementById('typeChart').innerHTML = chart || 'Нет данных';
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('content' + n).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach((el, i) => el.classList.toggle('active', i === n));
            if (n === 2 && map) setTimeout(() => map.invalidateSize(), 300);
        }

        window.onload = init;
    </script>
</body>
</html>
